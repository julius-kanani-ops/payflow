services:
  payflow_db:
    image: postgres:16
    environment:
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow
      POSTGRES_DB: payflow
    ports:
      - "5432:5432"
    volumes:
      - payflow_db_data:/var/lib/postgresql/data

  payflow_redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - payflow_redis_data:/data

volumes:
  payflow_redis_data: 
  payflow_db_data: